services:
  - type: web
    name: athena-v5-portal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-portal.txt
    startCommand: uvicorn portal_server:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ATHENA_WEB_LOAD_MODEL
        value: "0"
      - key: ATHENA_PORTAL_PATH_PREFIX
        value: "/AthenaV5"
