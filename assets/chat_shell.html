<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Athena WebUI</title>
    <link rel="stylesheet" href="./chat.css" />
    <script>
      window.__ATHENA_LOCAL_MATHJAX = "./mathjax/es5/tex-mml-chtml.js";
      window.__ATHENA_CDN_MATHJAX = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true,
          packages: { "[+]": ["ams"] },
        },
        startup: {
          typeset: false,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
        svg: { fontCache: "global" },
      };

      (function loadMathJax() {
        function addScript(src, onerror) {
          const el = document.createElement("script");
          el.defer = true;
          el.src = src;
          if (onerror) {
            el.onerror = onerror;
          }
          document.head.appendChild(el);
        }

        addScript(window.__ATHENA_LOCAL_MATHJAX, function () {
          console.warn("Local MathJax bundle missing. Falling back to CDN.");
          addScript(window.__ATHENA_CDN_MATHJAX, function () {
            console.warn("CDN MathJax failed. LaTeX will remain untypeset.");
          });
        });
      })();
    </script>
    <script defer src="./chat.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="hud">
        <div class="hud-title">ATHENA CONSOLE</div>
        <div class="hud-subtitle">Markdown + LaTeX + Emoji Renderer</div>
      </header>
      <main id="transcript-scroll" class="transcript-scroll">
        <section id="transcript" class="transcript"></section>
      </main>
    </div>
  </body>
</html>
