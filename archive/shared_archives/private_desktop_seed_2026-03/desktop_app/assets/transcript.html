<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Athena Desktop Transcript</title>
    <link rel="stylesheet" href="./transcript.css" />
    <script>
      window.__ATHENA_LOCAL_MATHJAX = "../../archive/legacy_desktop/assets/mathjax/es5/tex-mml-chtml.js";
      window.__ATHENA_CDN_MATHJAX = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true,
        },
        startup: {
          typeset: false,
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"],
        },
        svg: { fontCache: "global" },
      };

      (function loadMathJax() {
        function addScript(src, onerror) {
          const el = document.createElement("script");
          el.defer = true;
          el.src = src;
          if (onerror) el.onerror = onerror;
          document.head.appendChild(el);
        }

        addScript(window.__ATHENA_LOCAL_MATHJAX, function () {
          addScript(window.__ATHENA_CDN_MATHJAX, function () {
            console.warn("MathJax failed to load. Rendering without typesetting.");
          });
        });
      })();
    </script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script defer src="./transcript.js"></script>
  </head>
  <body>
    <div class="backdrop">
      <div class="flare flare-a"></div>
      <div class="flare flare-b"></div>
      <main id="transcript-scroll" class="transcript-scroll">
        <section id="transcript" class="transcript"></section>
      </main>
    </div>
  </body>
</html>
